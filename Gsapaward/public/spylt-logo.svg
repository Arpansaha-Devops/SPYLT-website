<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for bottle body -->
    <linearGradient id="bottleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faeade;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5d4b8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for liquid -->
    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3a458;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#c88e64;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Radial gradient for glow -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#faeade;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#faeade;stop-opacity:0" />
    </radialGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Outer glow circle -->
  <circle cx="100" cy="100" r="99" fill="url(#glowGradient)" />
  
  <!-- Main background circle -->
  <circle cx="100" cy="100" r="98" fill="#232224" stroke="#faeade" stroke-width="2"/>
  
  <!-- Border ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#e3a458" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Main Icon Group -->
  <g transform="translate(100, 100)" filter="url(#shadow)">
    <!-- Bottle Cap/Lid -->
    <rect x="-16" y="-50" width="32" height="10" fill="#e3a458" rx="2"/>
    <rect x="-16" y="-50" width="32" height="4" fill="#faeade" opacity="0.5" rx="2"/>
    
    <!-- Cap Top Accent -->
    <circle cx="0" cy="-50" r="18" fill="none" stroke="#faeade" stroke-width="1" opacity="0.4"/>
    
    <!-- Bottle Neck -->
    <path d="M -14 -40 L -12 -25 L 12 -25 L 14 -40 Z" fill="#faeade" stroke="#e3a458" stroke-width="0.5"/>
    
    <!-- Main Bottle Body - Premium S-Curve Shape -->
    <path d="M -24 -22 Q -30 -5 -28 12 Q -26 28 -12 38 Q 0 45 12 38 Q 26 28 28 12 Q 30 -5 24 -22 Q 22 -30 12 -32 L -12 -32 Q -22 -30 -24 -22 Z" 
          fill="url(#bottleGradient)" stroke="#e3a458" stroke-width="1.2" stroke-linejoin="round"/>
    
    <!-- Liquid inside bottle -->
    <path d="M -22 -8 Q -27 6 -24 18 Q -22 30 -10 37 Q 2 43 10 37 Q 22 30 24 18 Q 27 6 22 -8" 
          fill="url(#liquidGradient)"/>
    
    <!-- Liquid foam/bubbles effect -->
    <circle cx="-8" cy="10" r="2.5" fill="#faeade" opacity="0.3"/>
    <circle cx="6" cy="15" r="2" fill="#faeade" opacity="0.25"/>
    <circle cx="0" cy="20" r="1.5" fill="#faeade" opacity="0.2"/>
    
    <!-- Premium shine/highlight -->
    <ellipse cx="-10" cy="-8" rx="5" ry="14" fill="#faeade" opacity="0.5"/>
    <ellipse cx="-10" cy="-8" rx="3" ry="10" fill="#faeade" opacity="0.3"/>
    
    <!-- Bold "S" Letter for SPYLT -->
    <text x="0" y="6" font-family="Antonio, sans-serif" font-size="32" font-weight="900" 
          fill="#232224" text-anchor="middle" dominant-baseline="middle" letter-spacing="0">S</text>
    
    <!-- Decorative accent lines -->
    <line x1="-28" y1="-15" x2="-20" y2="-15" stroke="#faeade" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <line x1="20" y1="25" x2="28" y2="25" stroke="#faeade" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom corner accent -->
  <circle cx="100" cy="168" r="3" fill="#e3a458" opacity="0.6"/>
  <circle cx="100" cy="168" r="5" fill="#e3a458" opacity="0.2"/>
</svg>